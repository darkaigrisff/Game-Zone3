<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>


<body>

<div class="overlay"></div>


<nav>

<h1>Game<span>Shop</span></h1>

<a href="index.html" class="btn">
Accueil
</a>

</nav>



<section id="commande">


<h2 class="titre">
Passer une commande
</h2>


<form id="commandeForm">


<input 
type="text" 
id="pseudo"
placeholder="Pseudo du joueur"
required
>


<input 
type="number" 
id="uid"
placeholder="UID du joueur"
required
>


<select id="jeu" required>

<option value="">
Choisir le jeu
</option>

<option>
Free Fire
</option>

<option>
PUBG Mobile
</option>

<option>
Mobile Legends
</option>

</select>



<input 
type="text"
id="serveur"
placeholder="Serveur / Région"
>



<select id="pack" required>

<option value="">
Choisir un pack
</option>

<option>
100 Diamants
</option>

<option>
500 Diamants
</option>

<option>
1000 Diamants
</option>
</option>
330 Diamants
</option>
<option>
Pack VIP
</option>

</select>



<select id="paiement" required>

<option value="">
Mode de paiement
</option>

<option>
Airtel Money
</option>

<option>
Moov Money
</option>

<option>
Carte bancaire
</option>

</select>



<input 
type="tel"
id="telephone"
placeholder="Votre numéro WhatsApp"
required
>






</form>


</section>



<script src="script.js"></script>
</div>
  
<a href="confirmation.html" class="submit-btn">
  
✅ Valider la commande
</a>
